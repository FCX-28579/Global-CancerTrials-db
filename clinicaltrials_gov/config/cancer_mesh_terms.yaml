# Cancer-related MeSH handling rules for ClinicalTrials.gov browse_conditions.
#
# These terms are exact or normalized MeSH labels observed in AACT/ClinicalTrials.gov
# browse_conditions or standard oncology MeSH terminology. They are split by how
# safe they are as standalone evidence that a trial belongs in an oncology trial
# database.
#
# Operational rule:
# - malignant_or_cancer_specific: keep as high-confidence oncology.
# - precancer_or_prevention: keep as cancer prevention / precancer-related.
# - broad_or_ambiguous_review: keep pending for LLM/manual review.
# - benign_or_non_oncology_exclude: reject when no stronger malignant/precancer
#   MeSH term is present for the same trial.

version: 0.1

malignant_or_cancer_specific:
  # Core malignant neoplasm language
  - Adenocarcinoma
  - Carcinoma
  - Carcinoma, Ductal, Breast
  - Carcinoma, Hepatocellular
  - Carcinoma, Non-Small-Cell Lung
  - Carcinoma, Renal Cell
  - Carcinoma, Small Cell
  - Carcinoma, Squamous Cell
  - Cholangiocarcinoma
  - Malignant
  - Malignant Neoplasms
  - Neoplasm Metastasis
  - Neoplasm Recurrence, Local
  - Neoplastic Cells, Circulating

  # Hematologic malignancies
  - Acute Myeloid Leukemia
  - Bone Marrow Neoplasms
  - Chronic Myeloid Leukemia
  - Hodgkin Disease
  - Leukemia
  - Leukemia, Lymphoid
  - Leukemia, Myeloid
  - Lymphoma
